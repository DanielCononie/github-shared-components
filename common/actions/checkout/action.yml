name: checkout
description: Checkout a repository

inputs:
  repository:
    description: Repository name with owner. Defaults to the current repository.
    required: false
    default: ${{ github.repository }}
  ref:
    description: Branch, tag, or SHA to checkout
    required: false
    default: ${{ github.ref }}
  path:
    description: Relative path under $GITHUB_WORKSPACE to place the repository
    required: false
    default: "."
  fetch-depth:
    description: Number of commits to fetch. Use 0 for full history.
    required: false
    default: "1"
  token:
    description: Token used to fetch the repository
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        path: ${{ inputs.path }}
        fetch-depth: ${{ inputs.fetch-depth }}
        token: ${{ inputs.token }}
