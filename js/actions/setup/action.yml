name: nodejs-setup
description: Setup Node.js

inputs: 
  node-version: 
    required: true
  pkg-manager:
    required: false
  working-dir:
    required: false
  cache:
    required: false


runs: 
  using: "composite"
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}