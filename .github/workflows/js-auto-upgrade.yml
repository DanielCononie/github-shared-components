# .github/workflows/js-auto-upgrade-test.yml
name: JS Auto Upgrade (Test)

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: Node.js version
        required: false
        default: "22"

      pkg-manager:
        description: Package manager
        required: false
        default: "npm"

      working-dir:
        description: Directory containing package.json
        required: false
        default: "."

      upgrade-type:
        description: latest, minor, or patch
        required: false
        default: "patch"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./js/actions/setup
        with:
          node-version: ${{ inputs.node-version }}

      - name: Upgrade dependencies
        uses: ./js/actions/auto-upgrade
        with:
          pkg-manager: ${{ inputs.pkg-manager }}
          working-dir: ${{ inputs.working-dir }}
          upgrade-type: ${{ inputs.upgrade-type }}

      - name: Install dependencies
        uses: ./js/actions/install-deps
        with:
          pkg-manager: ${{ inputs.pkg-manager }}
          working-dir: ${{ inputs.working-dir }}

      - name: Run tests
        uses: ./js/actions/test
        with:
          pkg-manager: ${{ inputs.pkg-manager }}
          working-dir: ${{ inputs.working-dir }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto-upgrade/js-dependencies
          commit-message: "chore: auto-upgrade JS dependencies"
          title: "chore: auto-upgrade JS dependencies"
          body: |
            Test run of JS dependency auto-upgrade.
          labels: dependencies, automated
          delete-branch: true