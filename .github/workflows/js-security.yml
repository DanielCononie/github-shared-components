name: JS Security

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        required: false
        type: string
        default: "22"

      pkg-manager:
        description: Package manager
        required: false
        type: string
        default: "npm"

      working-dir:
        description: Directory containing package.json
        required: false
        type: string
        default: "."

      audit-level:
        description: Minimum vulnerability level that fails the audit
        required: false
        type: string
        default: "high"

      components-ref:
        description: Ref of DanielCononie/github-shared-components to use for composite actions
        required: false
        type: string
        default: "v1"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout shared action components
        uses: actions/checkout@v4
        with:
          repository: DanielCononie/github-shared-components
          ref: ${{ inputs.components-ref }}
          path: .github/shared-components

      - name: Setup Node.js
        uses: ./.github/shared-components/js/actions/setup
        with:
          node-version: ${{ inputs.node-version }}
          pkg-manager: ${{ inputs.pkg-manager }}

      - name: Install dependencies
        uses: ./.github/shared-components/js/actions/install-deps
        with:
          pkg-manager: ${{ inputs.pkg-manager }}
          working-dir: ${{ inputs.working-dir }}

      - name: Audit dependencies
        uses: ./.github/shared-components/js/actions/vuln-check
        with:
          pkg-manager: ${{ inputs.pkg-manager }}
          working-dir: ${{ inputs.working-dir }}
          audit-level: ${{ inputs.audit-level }}
