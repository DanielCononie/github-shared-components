name: Test JS Setup

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run local JS setup action
        uses: ./js/actions/setup
        with:
          node-version: "22"